<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>우리반 캠스터디</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  :root{
    --bg:#0f1226; --card:#1a1f3d; --card2:#232a52; --line:#2e3766;
    --txt:#e8ebff; --sub:#9aa3d4; --accent:#6c7cff; --accent2:#46d39a;
    --danger:#ff5c7a; --warn:#ffb454;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,'Segoe UI',Roboto,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--bg);color:var(--txt);min-height:100vh}
  .hidden{display:none !important}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:12px;font-weight:600}
  input,textarea,select{font-family:inherit;width:100%;padding:13px 14px;border-radius:12px;
    border:1px solid var(--line);background:var(--card2);color:var(--txt);font-size:15px;outline:none}
  input:focus,textarea:focus,select:focus{border-color:var(--accent)}
  label{font-size:13px;color:var(--sub);margin-bottom:6px;display:block}

  /* ---- 상단 네비 ---- */
  .nav{position:sticky;top:0;z-index:30;display:flex;gap:8px;padding:12px 16px;
    background:rgba(15,18,38,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);align-items:center}
  .nav .brand{font-weight:800;font-size:17px;margin-right:auto}
  .nav .tab{padding:8px 14px;background:var(--card2);color:var(--sub);font-size:14px}
  .nav .tab.active{background:var(--accent);color:#fff}
  .nav .who{font-size:12px;color:var(--sub)}
  .nav .icon-btn{padding:8px 12px;background:var(--card2);color:var(--txt);font-size:13px}

  .wrap{max-width:1100px;margin:0 auto;padding:16px}

  /* ---- 로그인 ---- */
  .login-card{max-width:380px;margin:8vh auto;background:var(--card);padding:30px 26px;
    border-radius:22px;border:1px solid var(--line);box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .login-card h1{margin:0 0 4px;font-size:24px}
  .login-card p.sub{margin:0 0 22px;color:var(--sub);font-size:13px}
  .field{margin-bottom:14px}
  .btn-primary{width:100%;padding:14px;background:var(--accent);color:#fff;font-size:16px;margin-top:6px}
  .btn-primary:active{transform:scale(.98)}
  .msg{font-size:13px;margin-top:12px;text-align:center;min-height:18px}
  .msg.err{color:var(--danger)}
  .msg.ok{color:var(--accent2)}
  .hint{font-size:12px;color:var(--sub);margin-top:18px;text-align:center;line-height:1.6}

  /* ---- 캠스터디 ---- */
  .study-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
  .count-badge{display:flex;align-items:center;gap:8px;background:var(--card);padding:10px 16px;
    border-radius:14px;border:1px solid var(--line);font-size:15px}
  .count-badge b{font-size:22px;color:var(--accent2)}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--accent2);box-shadow:0 0 0 4px rgba(70,211,154,.2)}
  .controls{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap}
  .ctrl{padding:11px 16px;background:var(--card2);color:var(--txt);font-size:14px;border:1px solid var(--line)}
  .ctrl.on{background:var(--accent);border-color:var(--accent)}
  .ctrl.danger{background:var(--danger)}
  .ctrl.join{background:var(--accent2);color:#06251a}

  .study-layout{display:grid;grid-template-columns:1fr 320px;gap:14px}
  @media(max-width:820px){.study-layout{grid-template-columns:1fr}}

  .video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;
    background:var(--card);padding:12px;border-radius:18px;border:1px solid var(--line);min-height:240px;align-content:start}
  .tile{position:relative;aspect-ratio:4/3;background:#0a0c1c;border-radius:12px;overflow:hidden;border:1px solid var(--line)}
  .tile video{width:100%;height:100%;object-fit:cover;background:#0a0c1c}
  .tile .name{position:absolute;left:8px;bottom:8px;background:rgba(0,0,0,.55);padding:3px 8px;
    border-radius:8px;font-size:12px}
  .tile .nocam{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:6px;color:var(--sub);font-size:13px}
  .tile .nocam .av{width:46px;height:46px;border-radius:50%;background:var(--accent);
    display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:18px}
  .empty-study{grid-column:1/-1;text-align:center;color:var(--sub);padding:40px 10px;font-size:14px}

  /* 채팅 */
  .chat-panel{background:var(--card);border-radius:18px;border:1px solid var(--line);
    display:flex;flex-direction:column;height:520px}
  .chat-head{padding:12px 14px;border-bottom:1px solid var(--line);font-weight:700;font-size:14px}
  .chat-log{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
  .chat-msg{font-size:14px;line-height:1.4}
  .chat-msg .who{color:var(--accent);font-weight:600;margin-right:6px}
  .chat-msg.system{color:var(--sub);font-size:12px;text-align:center}
  .chat-msg.me .who{color:var(--accent2)}
  .chat-input{display:flex;gap:8px;padding:10px;border-top:1px solid var(--line)}
  .chat-input input{padding:11px}
  .chat-input button{padding:0 18px;background:var(--accent);color:#fff}

  /* 화면 가리기 오버레이 */
  #privacyOverlay{position:fixed;inset:0;z-index:100;background:#05060f;
    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px}
  #privacyOverlay .big{font-size:20px;color:var(--sub)}
  #privacyOverlay .timer{font-size:42px;font-weight:800}
  #privacyOverlay button{padding:14px 28px;background:var(--card2);color:var(--txt);font-size:15px;border:1px solid var(--line)}
  #privacyOverlay .tip{font-size:12px;color:#4a5285}

  /* ---- 질문방 ---- */
  .q-toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .q-toolbar button{padding:11px 18px;background:var(--accent);color:#fff;font-size:14px}
  .q-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
  .q-card{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;cursor:pointer;transition:.15s}
  .q-card:active{transform:scale(.98)}
  .q-card .thumb{width:100%;height:150px;object-fit:cover;background:var(--card2)}
  .q-card .thumb.noimg{display:flex;align-items:center;justify-content:center;color:var(--sub);font-size:13px}
  .q-card .body{padding:12px}
  .q-card .subject{display:inline-block;background:var(--accent);color:#fff;font-size:11px;
    padding:3px 9px;border-radius:20px;margin-bottom:8px}
  .q-card .preview{font-size:13px;color:var(--txt);line-height:1.4;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:18px}
  .q-card .meta{font-size:11px;color:var(--sub);margin-top:8px;display:flex;justify-content:space-between}

  /* 모달 */
  .modal{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.65);display:flex;align-items:flex-end;justify-content:center}
  @media(min-width:600px){.modal{align-items:center}}
  .modal-card{background:var(--card);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;
    border-radius:22px 22px 0 0;padding:22px}
  @media(min-width:600px){.modal-card{border-radius:22px}}
  .modal-card h2{margin:0 0 16px;font-size:19px}
  .modal-card .row{margin-bottom:14px}
  .modal-actions{display:flex;gap:10px;margin-top:8px}
  .modal-actions button{flex:1;padding:13px}
  .btn-cancel{background:var(--card2);color:var(--txt);border:1px solid var(--line)}
  .btn-ok{background:var(--accent);color:#fff}
  .preview-img{width:100%;border-radius:12px;margin-top:10px;max-height:260px;object-fit:contain;background:#0a0c1c}

  .detail-img{width:100%;border-radius:12px;background:#0a0c1c;max-height:50vh;object-fit:contain;margin-bottom:14px}
  .answer{background:var(--card2);border-radius:12px;padding:12px;margin-bottom:8px;font-size:14px}
  .answer .who{font-size:12px;color:var(--accent);margin-bottom:4px}
  .answer-input{display:flex;gap:8px;margin-top:12px}
  .answer-input button{padding:0 18px;background:var(--accent);color:#fff}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card2);
    color:var(--txt);padding:12px 20px;border-radius:14px;border:1px solid var(--line);
    z-index:200;font-size:14px;box-shadow:0 8px 30px rgba(0,0,0,.5)}
</style>
</head>
<body>

<!-- ============ 로그인 화면 ============ -->
<div id="screen-login">
  <div class="login-card">
    <h1>📚 우리반 캠스터디</h1>
    <p class="sub">학번으로 로그인하세요</p>
    <div class="field">
      <label>학번 (아이디)</label>
      <input id="loginId" placeholder="예) 30101" autocomplete="username" inputmode="numeric" maxlength="5"/>
    </div>
    <div class="field">
      <label>비밀번호</label>
      <input id="loginPw" type="password" placeholder="초기 비밀번호: 1234" autocomplete="current-password"/>
    </div>
    <button class="btn-primary" onclick="doLogin()">로그인</button>
    <div id="loginMsg" class="msg"></div>
    <div class="hint">처음이라면 비밀번호 <b>1234</b> 로 로그인하세요.<br>로그인 후 비밀번호를 바꿀 수 있습니다.</div>
  </div>
</div>

<!-- ============ 메인(로그인 후) ============ -->
<div id="screen-main" class="hidden">
  <div class="nav">
    <div class="brand">📚 캠스터디</div>
    <button class="tab active" id="tab-study" onclick="showTab('study')">캠스터디</button>
    <button class="tab" id="tab-qna" onclick="showTab('qna')">질문방</button>
    <span class="who" id="navWho"></span>
    <button class="icon-btn" onclick="openPwModal()">비번변경</button>
    <button class="icon-btn" onclick="logout()">로그아웃</button>
  </div>

  <!-- 캠스터디 탭 -->
  <div id="view-study" class="wrap">
    <div class="study-top">
      <div class="count-badge">
        <span class="dot"></span>
        현재 <b id="studyCount">0</b> 명 참여중
      </div>
      <div class="controls">
        <button class="ctrl join" id="btnJoin" onclick="toggleStudy()">캠스터디 참여하기</button>
        <button class="ctrl" id="btnCam" onclick="toggleCam()" disabled>📷 카메라 켜기</button>
        <button class="ctrl" id="btnPrivacy" onclick="openPrivacy()" disabled>🙈 화면 가리기</button>
      </div>
    </div>

    <div class="study-layout">
      <div class="video-grid" id="videoGrid">
        <div class="empty-study" id="studyEmpty">
          아직 참여하지 않았어요.<br>“캠스터디 참여하기”를 눌러 친구들과 함께 공부해요!<br>
          <small style="color:#4a5285">※ 마이크는 사용할 수 없고 채팅으로만 대화해요. 카메라 없이도 참여 가능!</small>
        </div>
      </div>

      <div class="chat-panel">
        <div class="chat-head">💬 채팅</div>
        <div class="chat-log" id="chatLog"></div>
        <div class="chat-input">
          <input id="chatInput" placeholder="메시지 입력..." onkeydown="if(event.key==='Enter')sendChat()" disabled/>
          <button onclick="sendChat()" id="chatSendBtn" disabled>전송</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 질문방 탭 -->
  <div id="view-qna" class="wrap hidden">
    <div class="q-toolbar">
      <button onclick="openAskModal()">+ 질문 올리기</button>
      <button onclick="loadQuestions()" style="background:var(--card2)">새로고침</button>
    </div>
    <div class="q-list" id="qList"></div>
  </div>
</div>

<!-- 화면 가리기 오버레이 -->
<div id="privacyOverlay" class="hidden">
  <div class="big">집중 모드 🌙</div>
  <div class="timer" id="privacyTimer">00:00</div>
  <div class="tip">캠스터디는 뒤에서 계속 진행중이에요. 옆 사람 눈치 안 보고 공부하세요!</div>
  <button onclick="closePrivacy()">화면 다시 보기</button>
</div>

<!-- 비밀번호 변경 모달 -->
<div id="pwModal" class="modal hidden">
  <div class="modal-card">
    <h2>비밀번호 변경</h2>
    <div class="row"><label>현재 비밀번호</label><input id="curPw" type="password"/></div>
    <div class="row"><label>새 비밀번호 (4자 이상)</label><input id="newPw" type="password"/></div>
    <div id="pwMsg" class="msg"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closePwModal()">취소</button>
      <button class="btn-ok" onclick="changePw()">변경</button>
    </div>
  </div>
</div>

<!-- 질문 작성 모달 -->
<div id="askModal" class="modal hidden">
  <div class="modal-card">
    <h2>질문 올리기</h2>
    <div class="row">
      <label>과목</label>
      <input id="askSubject" placeholder="예) 수학, 영어, 물리..."/>
    </div>
    <div class="row">
      <label>문제 사진 (카메라 촬영 또는 갤러리)</label>
      <input id="askImage" type="file" accept="image/*" capture="environment" onchange="previewAsk(this)"/>
      <img id="askPreview" class="preview-img hidden"/>
    </div>
    <div class="row">
      <label>질문 내용 (선택)</label>
      <textarea id="askBody" rows="3" placeholder="어디가 막히는지 적어주세요"></textarea>
    </div>
    <div id="askMsg" class="msg"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAskModal()">취소</button>
      <button class="btn-ok" onclick="submitQuestion()">올리기</button>
    </div>
  </div>
</div>

<!-- 질문 상세 모달 -->
<div id="detailModal" class="modal hidden">
  <div class="modal-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h2 id="detailSubject" style="margin:0"></h2>
      <button class="btn-cancel" style="padding:8px 14px;flex:none" onclick="closeDetail()">닫기</button>
    </div>
    <img id="detailImg" class="detail-img hidden"/>
    <p id="detailBody" style="font-size:15px;line-height:1.5;color:var(--txt)"></p>
    <div id="detailMeta" style="font-size:12px;color:var(--sub);margin-bottom:16px"></div>
    <h3 style="font-size:15px;margin:8px 0">답변</h3>
    <div id="answerList"></div>
    <div class="answer-input">
      <input id="answerInput" placeholder="답변 달기..." onkeydown="if(event.key==='Enter')submitAnswer()"/>
      <button onclick="submitAnswer()">등록</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// 전역 상태
// ============================================================
let token = null, me = null, socket = null;
let localStream = null;       // 내 카메라 스트림
let inStudy = false, camOn = false;
const peers = {};             // socketId -> RTCPeerConnection
const RTC_CONFIG = { iceServers:[{urls:"stun:stun.l.google.com:19302"}] };

function api(path, opts={}){
  opts.headers = Object.assign({"Content-Type":"application/json"}, opts.headers||{});
  if(token) opts.headers.Authorization = "Bearer "+token;
  return fetch(path, opts).then(async r=>{
    const d = await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(d.error||"요청 실패");
    return d;
  });
}
function toast(t){
  const el=document.createElement("div");el.className="toast";el.textContent=t;
  document.body.appendChild(el);setTimeout(()=>el.remove(),2200);
}
const $=id=>document.getElementById(id);

// ============================================================
// 로그인 / 인증
// ============================================================
async function doLogin(){
  const studentId=$("loginId").value.trim(), password=$("loginPw").value;
  const msg=$("loginMsg"); msg.className="msg"; msg.textContent="";
  try{
    const d=await api("/api/login",{method:"POST",body:JSON.stringify({studentId,password})});
    token=d.token; me={studentId:d.studentId,nickname:d.nickname};
    $("screen-login").classList.add("hidden");
    $("screen-main").classList.remove("hidden");
    $("navWho").textContent=me.nickname;
    connectSocket();
    loadQuestions();
    if(d.mustChange){ toast("초기 비밀번호 사용중! 비밀번호를 변경해주세요."); openPwModal(); }
  }catch(e){ msg.className="msg err"; msg.textContent=e.message; }
}
function logout(){
  if(inStudy) leaveStudy();
  if(socket) socket.disconnect();
  token=null;me=null;
  $("screen-main").classList.add("hidden");
  $("screen-login").classList.remove("hidden");
  $("loginPw").value="";
}

// ============================================================
// 비밀번호 변경
// ============================================================
function openPwModal(){$("pwModal").classList.remove("hidden");$("pwMsg").textContent="";}
function closePwModal(){$("pwModal").classList.add("hidden");$("curPw").value="";$("newPw").value="";}
async function changePw(){
  const msg=$("pwMsg");msg.className="msg";
  try{
    await api("/api/change-password",{method:"POST",
      body:JSON.stringify({currentPassword:$("curPw").value,newPassword:$("newPw").value})});
    msg.className="msg ok";msg.textContent="변경되었습니다!";
    setTimeout(closePwModal,800);
  }catch(e){msg.className="msg err";msg.textContent=e.message;}
}

// ============================================================
// 탭 전환
// ============================================================
function showTab(t){
  $("tab-study").classList.toggle("active",t==="study");
  $("tab-qna").classList.toggle("active",t==="qna");
  $("view-study").classList.toggle("hidden",t!=="study");
  $("view-qna").classList.toggle("hidden",t!=="qna");
  if(t==="qna") loadQuestions();
}

// ============================================================
// Socket 연결 + 캠스터디
// ============================================================
function connectSocket(){
  socket=io({auth:{token}});
  socket.on("connect_error",e=>toast("연결 오류: "+e.message));

  socket.on("participant-count",n=>{ $("studyCount").textContent=n; });

  // 입장 시 기존 참가자들에게 내가 offer 보냄
  socket.on("existing-participants",list=>{
    list.forEach(p=>{ ensureTile(p.id,p.nickname,p.camOn); createPeer(p.id,true); });
    refreshEmpty();
  });
  socket.on("user-joined",p=>{
    ensureTile(p.id,p.nickname,p.camOn); refreshEmpty();
    // 신규 입장자가 우리에게 offer를 보낼 것이므로 여기선 tile만
  });
  socket.on("user-left",({id})=>{ removePeer(id); removeTile(id); refreshEmpty(); });
  socket.on("peer-cam-state",({id,camOn})=>{ updateTileCam(id,camOn); });

  // WebRTC 시그널링
  socket.on("webrtc-offer", async ({from,sdp})=>{
    const pc=createPeer(from,false);
    await pc.setRemoteDescription(sdp);
    const ans=await pc.createAnswer();
    await pc.setLocalDescription(ans);
    socket.emit("webrtc-answer",{to:from,sdp:pc.localDescription});
  });
  socket.on("webrtc-answer", async ({from,sdp})=>{
    const pc=peers[from]; if(pc) await pc.setRemoteDescription(sdp);
  });
  socket.on("webrtc-ice", async ({from,candidate})=>{
    const pc=peers[from]; if(pc&&candidate) try{await pc.addIceCandidate(candidate);}catch(e){}
  });

  // 채팅
  socket.on("chat",m=>addChat(m));
}

async function toggleStudy(){ inStudy ? leaveStudy() : joinStudy(); }

async function joinStudy(){
  inStudy=true;
  $("btnJoin").textContent="캠스터디 나가기";
  $("btnJoin").classList.remove("join");$("btnJoin").classList.add("danger");
  $("btnCam").disabled=false; $("btnPrivacy").disabled=false;
  $("chatInput").disabled=false; $("chatSendBtn").disabled=false;
  // 내 타일 추가 (카메라는 아직 off)
  ensureTile("me",me.nickname+" (나)",false,true);
  socket.emit("join-study",{camOn:false});
  refreshEmpty();
}

function leaveStudy(){
  inStudy=false;camOn=false;
  socket.emit("leave-study");
  Object.keys(peers).forEach(removePeer);
  if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
  $("videoGrid").querySelectorAll(".tile").forEach(t=>t.remove());
  $("btnJoin").textContent="캠스터디 참여하기";
  $("btnJoin").classList.add("join");$("btnJoin").classList.remove("danger");
  $("btnCam").disabled=true;$("btnCam").textContent="📷 카메라 켜기";$("btnCam").classList.remove("on");
  $("btnPrivacy").disabled=true;
  $("chatInput").disabled=true;$("chatSendBtn").disabled=true;
  refreshEmpty();
}

// ---- 카메라 ----
async function toggleCam(){
  if(!camOn){
    try{
      // 비디오만! 마이크(audio)는 절대 요청하지 않음
      localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:false});
      camOn=true;
      $("btnCam").textContent="📷 카메라 끄기";$("btnCam").classList.add("on");
      const v=$("video-me"); if(v){v.srcObject=localStream;v.muted=true;}
      updateTileCam("me",true);
      // 모든 peer에 트랙 추가 후 재협상
      for(const id in peers){
        localStream.getTracks().forEach(tr=>peers[id].addTrack(tr,localStream));
        await renegotiate(id);
      }
      socket.emit("cam-state",{camOn:true});
    }catch(e){ toast("카메라를 사용할 수 없어요: "+e.message); }
  }else{
    camOn=false;
    if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
    $("btnCam").textContent="📷 카메라 켜기";$("btnCam").classList.remove("on");
    const v=$("video-me");if(v)v.srcObject=null;
    updateTileCam("me",false);
    socket.emit("cam-state",{camOn:false});
  }
}

// ---- WebRTC peer ----
function createPeer(id,initiator){
  if(peers[id]) return peers[id];
  const pc=new RTCPeerConnection(RTC_CONFIG);
  peers[id]=pc;
  if(localStream) localStream.getTracks().forEach(tr=>pc.addTrack(tr,localStream));
  pc.onicecandidate=e=>{ if(e.candidate) socket.emit("webrtc-ice",{to:id,candidate:e.candidate}); };
  pc.ontrack=e=>{
    const v=$("video-"+id);
    if(v){ v.srcObject=e.streams[0]; updateTileCam(id,true); }
  };
  if(initiator){ renegotiate(id); }
  return pc;
}
async function renegotiate(id){
  const pc=peers[id]; if(!pc) return;
  const offer=await pc.createOffer();
  await pc.setLocalDescription(offer);
  socket.emit("webrtc-offer",{to:id,sdp:pc.localDescription});
}
function removePeer(id){ if(peers[id]){peers[id].close();delete peers[id];} }

// ---- 비디오 타일 ----
function ensureTile(id,name,hasCam,isMe){
  if($("tile-"+id)) return;
  const grid=$("videoGrid");
  const div=document.createElement("div");
  div.className="tile"; div.id="tile-"+id;
  const initial=(name||"?").trim()[0]||"?";
  div.innerHTML=`
    <video id="video-${id}" autoplay playsinline ${isMe?"muted":""}></video>
    <div class="nocam" id="nocam-${id}">
      <div class="av">${initial}</div>
      <span>카메라 꺼짐</span>
    </div>
    <div class="name">${name}</div>`;
  grid.appendChild(div);
  updateTileCam(id,hasCam);
}
function updateTileCam(id,on){
  const nocam=$("nocam-"+id),video=$("video-"+id);
  if(!nocam||!video)return;
  nocam.style.display=on?"none":"flex";
  video.style.display=on?"block":"none";
}
function removeTile(id){ const t=$("tile-"+id); if(t)t.remove(); }
function refreshEmpty(){
  const hasTiles=$("videoGrid").querySelectorAll(".tile").length>0;
  $("studyEmpty").style.display=hasTiles?"none":"block";
}

// ---- 채팅 ----
function sendChat(){
  const inp=$("chatInput"),t=inp.value.trim();
  if(!t)return; socket.emit("chat",{text:t}); inp.value="";
}
function addChat(m){
  const log=$("chatLog");const div=document.createElement("div");
  if(m.system){ div.className="chat-msg system";div.textContent=m.text; }
  else{
    const mine=m.studentId===me.studentId;
    div.className="chat-msg"+(mine?" me":"");
    div.innerHTML=`<span class="who">${m.nickname}</span><span>${escapeHtml(m.text)}</span>`;
  }
  log.appendChild(div); log.scrollTop=log.scrollHeight;
}
function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

// ============================================================
// 화면 가리기 (집중 모드)
// ============================================================
let privacyTimer=null,privacyStart=0;
function openPrivacy(){
  $("privacyOverlay").classList.remove("hidden");
  privacyStart=Date.now();
  privacyTimer=setInterval(()=>{
    const s=Math.floor((Date.now()-privacyStart)/1000);
    const mm=String(Math.floor(s/60)).padStart(2,"0"),ss=String(s%60).padStart(2,"0");
    $("privacyTimer").textContent=mm+":"+ss;
  },500);
}
function closePrivacy(){
  $("privacyOverlay").classList.add("hidden");
  clearInterval(privacyTimer);
}

// ============================================================
// 질문방
// ============================================================
async function loadQuestions(){
  if(!token)return;
  try{
    const list=await api("/api/questions");
    const wrap=$("qList");wrap.innerHTML="";
    if(!list.length){wrap.innerHTML='<div style="color:var(--sub);grid-column:1/-1;padding:30px;text-align:center">아직 질문이 없어요. 첫 질문을 올려보세요!</div>';return;}
    list.forEach(q=>{
      const card=document.createElement("div");card.className="q-card";
      card.onclick=()=>openDetail(q.id);
      const thumb=q.image_path
        ? `<img class="thumb" src="${q.image_path}"/>`
        : `<div class="thumb noimg">사진 없음</div>`;
      card.innerHTML=`${thumb}<div class="body">
        <span class="subject">${escapeHtml(q.subject)}</span>
        <div class="preview">${escapeHtml(q.body||"")}</div>
        <div class="meta"><span>${q.student_id}</span><span>💬 ${q.answer_count}</span></div>
      </div>`;
      wrap.appendChild(card);
    });
  }catch(e){toast(e.message);}
}

// 질문 작성 모달
function openAskModal(){$("askModal").classList.remove("hidden");}
function closeAskModal(){
  $("askModal").classList.add("hidden");
  $("askSubject").value="";$("askBody").value="";$("askImage").value="";
  $("askPreview").classList.add("hidden");$("askMsg").textContent="";
}
function previewAsk(input){
  const f=input.files[0];if(!f)return;
  const img=$("askPreview");img.src=URL.createObjectURL(f);img.classList.remove("hidden");
}
async function submitQuestion(){
  const subject=$("askSubject").value.trim();
  const msg=$("askMsg");msg.className="msg";
  if(!subject){msg.className="msg err";msg.textContent="과목을 입력하세요.";return;}
  const fd=new FormData();
  fd.append("subject",subject);
  fd.append("body",$("askBody").value);
  if($("askImage").files[0]) fd.append("image",$("askImage").files[0]);
  try{
    const r=await fetch("/api/questions",{method:"POST",headers:{Authorization:"Bearer "+token},body:fd});
    const d=await r.json();if(!r.ok)throw new Error(d.error||"실패");
    closeAskModal();toast("질문이 올라왔어요!");loadQuestions();
  }catch(e){msg.className="msg err";msg.textContent=e.message;}
}

// 질문 상세
let currentQid=null;
async function openDetail(id){
  currentQid=id;
  try{
    const {question,answers}=await api("/api/questions/"+id);
    $("detailSubject").textContent=question.subject;
    if(question.image_path){$("detailImg").src=question.image_path;$("detailImg").classList.remove("hidden");}
    else $("detailImg").classList.add("hidden");
    $("detailBody").textContent=question.body||"(내용 없음)";
    $("detailMeta").textContent=`작성자 ${question.student_id} · ${new Date(question.created_at).toLocaleString()}`;
    renderAnswers(answers);
    $("detailModal").classList.remove("hidden");
  }catch(e){toast(e.message);}
}
function renderAnswers(answers){
  const wrap=$("answerList");wrap.innerHTML="";
  if(!answers.length){wrap.innerHTML='<div style="color:var(--sub);font-size:13px;padding:8px 0">아직 답변이 없어요. 첫 답변을 달아주세요!</div>';return;}
  answers.forEach(a=>{
    const d=document.createElement("div");d.className="answer";
    d.innerHTML=`<div class="who">${a.student_id} · ${new Date(a.created_at).toLocaleString()}</div>${escapeHtml(a.body)}`;
    wrap.appendChild(d);
  });
}
function closeDetail(){$("detailModal").classList.add("hidden");$("answerInput").value="";}
async function submitAnswer(){
  const body=$("answerInput").value.trim();if(!body)return;
  try{
    await api("/api/questions/"+currentQid+"/answers",{method:"POST",body:JSON.stringify({body})});
    $("answerInput").value="";
    const {answers}=await api("/api/questions/"+currentQid);
    renderAnswers(answers);loadQuestions();
  }catch(e){toast(e.message);}
}

$("loginPw").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
